  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#z-bg)"/>
  <g filter="url(#z-glow)">
    <path d="M60 28 A24 24 0 0 1 84 52 A24 24 0 0 1 72 70" stroke="url(#z-arc-warm)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M60 92 A24 24 0 0 1 36 68 A24 24 0 0 1 48 50" stroke="url(#z-arc-cool)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <circle cx="60" cy="60" r="4.5" fill="#fdf4ff"/>
    <circle cx="60" cy="60" r="7" stroke="#fdf4ff" stroke-width="1.5" stroke-opacity="0.4" fill="none"/>
  </g>
