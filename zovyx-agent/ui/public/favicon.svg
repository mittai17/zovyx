<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zuvix">
  <defs>
    <linearGradient id="z-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e0a3c"/>
      <stop offset="0.5" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="z-arc-warm" x1="20" y1="20" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e9d5ff"/>
      <stop offset="1" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="z-arc-cool" x1="100" y1="20" x2="20" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="z-glow" x="-30%" y="-30%" width="160%" height="160%">
